prometheus:
  prometheusSpec:
    retention: 15d
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  adminPassword: change-me-in-secret-manager
  sidecar:
    dashboards:
      enabled: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: platform-team
    receivers:
      - name: platform-team
