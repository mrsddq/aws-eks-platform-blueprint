apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-platform-blueprint
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mrsddq/aws-eks-platform-blueprint.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
