apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app
  namespace: sample-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sample-app-read
  namespace: sample-app
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sample-app-read
  namespace: sample-app
subjects:
  - kind: ServiceAccount
    name: sample-app
    namespace: sample-app
roleRef:
  kind: Role
  name: sample-app-read
  apiGroup: rbac.authorization.k8s.io
